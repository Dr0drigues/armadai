<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArmadAI</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; }
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #656d76;
    --accent: #0969da;
    --green: #1a7f37;
    --yellow: #9a6700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  nav { display: flex; gap: 4px; }
  nav button { background: none; border: 1px solid transparent; color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  nav button:hover { color: var(--text); }
  nav button.active { background: var(--bg); border-color: var(--border); color: var(--text); }
  main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 16px; color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(88,166,255,0.04); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: rgba(88,166,255,0.15); color: var(--accent); margin-right: 4px; }
  .tag.stack { background: rgba(63,185,80,0.15); color: var(--green); }
  .clickable { cursor: pointer; }
  .clickable:hover td:first-child { color: var(--accent); }
  .detail { padding: 20px; }
  .detail h2 { font-size: 20px; margin-bottom: 16px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .detail-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
  .detail-field span { font-size: 14px; }
  .prompt-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; margin-bottom: 16px; }
  .prompt-box-title { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .back-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .cost { color: var(--yellow); }
  .list-section { margin-bottom: 16px; }
  .list-section h3 { font-size: 14px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .list-section ul { list-style: none; padding: 0; }
  .list-section li { padding: 4px 0; font-size: 14px; }
  .list-section li::before { content: "• "; color: var(--accent); }
  .file-details { margin-bottom: 8px; }
  .file-details summary { cursor: pointer; font-size: 14px; padding: 4px 0; color: var(--accent); }
  .file-details summary:hover { text-decoration: underline; }
  .file-content { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 13px; white-space: pre-wrap; line-height: 1.5; margin: 4px 0 8px 0; max-height: 400px; overflow-y: auto; }
  .search-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(88,166,255,0.02); }
  .search-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .search-input::placeholder { color: var(--muted); }
  .search-clear { background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 16px; line-height: 1; }
  .search-clear:hover { border-color: var(--accent); color: var(--accent); }
  .search-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  #view { display: none; }
  .mermaid { background: var(--bg); padding: 20px; text-align: center; }
  #theme-btn { background: none; border: 1px solid transparent; color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-left: auto; }
  #theme-btn:hover { color: var(--text); border-color: var(--border); }
  .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 { margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
  .markdown-body h1 { font-size: 24px; }
  .markdown-body h2 { font-size: 20px; }
  .markdown-body h3 { font-size: 16px; }
  .markdown-body h4 { font-size: 14px; }
  .markdown-body p { margin-bottom: 12px; line-height: 1.6; }
  .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 12px; }
  .markdown-body li { margin-bottom: 4px; }
  .markdown-body code { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-family: 'Courier New', monospace; font-size: 13px; }
  .markdown-body pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin-bottom: 12px; }
  .markdown-body pre code { background: none; border: none; padding: 0; }
  .markdown-body a { color: var(--accent); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted); margin: 12px 0; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .markdown-body th { background: var(--bg); font-weight: 600; }
  .download-btn { background: none; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 16px; margin-right: 8px; }
  .download-btn:hover { background: rgba(63,185,80,0.1); }
  [data-theme="light"] .download-btn { border-color: #1a7f37; color: #1a7f37; }
  [data-theme="light"] .download-btn:hover { background: rgba(26,127,55,0.1); }
  .yaml-block { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; line-height: 1.5; margin-bottom: 16px; overflow-x: auto; }
</style>
</head>
<body>
<header>
  <h1><span>Armad</span>AI</h1>
  <nav>
    <button class="active" onclick="showTab('agents')">Agents</button>
    <button onclick="showTab('prompts')">Prompts</button>
    <button onclick="showTab('skills')">Skills</button>
    <button onclick="showTab('starters')">Starters</button>
    <button onclick="showTab('history')">History</button>
    <button onclick="showTab('costs')">Costs</button>
    <button onclick="showTab('models')">Models</button>
    <button onclick="showTab('orchestration')">Orchestration</button>
  </nav>
  <button id="theme-btn" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
</header>
<main>
  <div id="agents" class="card"></div>
  <div id="prompts" class="card" style="display:none"></div>
  <div id="skills" class="card" style="display:none"></div>
  <div id="starters" class="card" style="display:none"></div>
  <div id="history" class="card" style="display:none"></div>
  <div id="costs" class="card" style="display:none"></div>
  <div id="models" class="card" style="display:none"></div>
  <div id="orchestration" class="card" style="display:none"></div>
  <div id="view" class="card"></div>
</main>
<script>
// Initialize Mermaid
mermaid.initialize({ startOnLoad: false, theme: 'dark' });

// Theme management
function initTheme() {
  const saved = localStorage.getItem('armadai-theme') || 'dark';
  applyTheme(saved);
}

function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('theme-btn').textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-btn').textContent = '🌙';
  }
  localStorage.setItem('armadai-theme', theme);
  mermaid.initialize({ startOnLoad: false, theme: theme === 'light' ? 'default' : 'dark' });
}

function toggleTheme() {
  const current = localStorage.getItem('armadai-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

// Markdown and sanitization helpers
function escapeHtmlContent(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function renderMarkdown(content) {
  if (!content) return '';
  marked.setOptions({ breaks: true, gfm: true });
  return marked.parse(content);
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function reconstructAgentMarkdown(agent) {
  let md = `# ${agent.name}\n\n## Metadata\n`;
  md += `- provider: ${agent.provider}\n`;
  md += `- model: ${agent.model}\n`;
  if (agent.temperature !== undefined) md += `- temperature: ${agent.temperature}\n`;
  if (agent.max_tokens) md += `- max_tokens: ${agent.max_tokens}\n`;
  if (agent.timeout) md += `- timeout: ${agent.timeout}\n`;
  if (agent.rate_limit) md += `- rate_limit: ${agent.rate_limit}\n`;
  if (agent.tags && agent.tags.length) md += `- tags: [${agent.tags.join(', ')}]\n`;
  if (agent.stacks && agent.stacks.length) md += `- stacks: [${agent.stacks.join(', ')}]\n`;
  md += `\n## System Prompt\n\n${agent.system_prompt || '(none)'}\n`;
  if (agent.instructions) md += `\n## Instructions\n\n${agent.instructions}\n`;
  if (agent.output_format) md += `\n## Output Format\n\n${agent.output_format}\n`;
  return md;
}

function reconstructPromptMarkdown(prompt) {
  let md = `# ${prompt.name}\n\n## Metadata\n`;
  if (prompt.description) md += `- description: ${prompt.description}\n`;
  if (prompt.apply_to && prompt.apply_to.length) md += `- apply_to: [${prompt.apply_to.join(', ')}]\n`;
  md += `\n## Content\n\n${prompt.body || '(empty)'}\n`;
  return md;
}

function reconstructSkillMarkdown(skill) {
  let md = `# ${skill.name}\n\n## Metadata\n`;
  if (skill.description) md += `- description: ${skill.description}\n`;
  if (skill.version) md += `- version: ${skill.version}\n`;
  if (skill.tools && skill.tools.length) md += `- tools: [${skill.tools.join(', ')}]\n`;
  md += `\n## SKILL.md\n\n${skill.body || '(empty)'}\n`;
  return md;
}

let currentTab = 'agents';
let viewBackTab = 'agents';

function createSearchBar(tableId) {
  const tableEl = document.querySelector(`#${tableId} table`);
  if (!tableEl) return;

  const container = tableEl.parentElement;
  const searchBar = document.createElement('div');
  searchBar.className = 'search-bar';
  searchBar.innerHTML = `
    <input type="text" class="search-input" placeholder="Filter..." aria-label="Filter table">
    <button class="search-clear" aria-label="Clear search">×</button>
    <span class="search-count"></span>
  `;

  const input = searchBar.querySelector('.search-input');
  const clearBtn = searchBar.querySelector('.search-clear');
  const counter = searchBar.querySelector('.search-count');

  function updateCount() {
    const rows = tableEl.querySelectorAll('tbody tr');
    const visible = Array.from(rows).filter(r => r.style.display !== 'none').length;
    counter.textContent = visible > 0 ? `Showing ${visible}/${rows.length} items` : 'No matches';
  }

  function filterTable() {
    const query = input.value.toLowerCase().trim();
    const rows = tableEl.querySelectorAll('tbody tr');

    rows.forEach(row => {
      if (!query) {
        row.style.display = '';
        return;
      }

      const text = row.textContent.toLowerCase();
      row.style.display = text.includes(query) ? '' : 'none';
    });

    updateCount();
  }

  input.addEventListener('input', filterTable);
  clearBtn.addEventListener('click', () => {
    input.value = '';
    filterTable();
    input.focus();
  });

  container.insertBefore(searchBar, tableEl);
  updateCount();
}

function showTab(tab) {
  document.querySelectorAll('nav button').forEach((b, i) => {
    const tabs = ['agents','prompts','skills','starters','history','costs','models','orchestration'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  ['agents','prompts','skills','starters','history','costs','models','orchestration','view'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById(tab).style.display = 'block';
  currentTab = tab;
  if (tab === 'agents') loadAgents();
  if (tab === 'prompts') loadPrompts();
  if (tab === 'skills') loadSkills();
  if (tab === 'starters') loadStarters();
  if (tab === 'history') loadHistory();
  if (tab === 'costs') loadCosts();
  if (tab === 'models') loadModels();
  if (tab === 'orchestration') loadOrchestration();
}

async function loadAgents() {
  const res = await fetch('/api/agents');
  const agents = await res.json();
  const el = document.getElementById('agents');
  if (!agents.length) { el.innerHTML = '<div class="empty">No agents found. Create one with: armadai new my-agent</div>'; return; }
  el.innerHTML = `
    <div class="card-header">${agents.length} agents loaded</div>
    <table>
      <tr><th>Agent</th><th>Provider</th><th>Model</th><th>Tags</th><th>Stacks</th></tr>
      <tbody>
        ${agents.map(a => `
          <tr class="clickable" onclick="viewAgent('${a.name}')">
            <td>${a.name}</td>
            <td>${a.provider}</td>
            <td>${a.model}</td>
            <td>${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</td>
            <td>${a.stacks.map(s => `<span class="tag stack">${s}</span>`).join('')}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  createSearchBar('agents');
}

async function viewAgent(name) {
  const res = await fetch(`/api/agents/${encodeURIComponent(name)}`);
  const a = await res.json();
  if (a.error) return;
  viewBackTab = 'agents';
  ['agents','prompts','skills','starters','history','costs','models'].forEach(id => document.getElementById(id).style.display = 'none');
  const el = document.getElementById('view');
  el.style.display = 'block';
  const agentMarkdown = reconstructAgentMarkdown(a);
  el.innerHTML = `
    <div class="detail">
      <div style="display:flex;gap:8px">
        <button class="back-btn" onclick="backToList()">&larr; Back to agents</button>
        <button class="download-btn" onclick="downloadText('${a.name}.md', reconstructAgentMarkdown(agentContent))">↓ Download .md</button>
      </div>
      <h2>${a.name}</h2>
      <div class="detail-grid">
        <div class="detail-field"><label>Provider</label><span>${a.provider}</span></div>
        <div class="detail-field"><label>Model</label><span>${a.model}</span></div>
        <div class="detail-field"><label>Temperature</label><span>${a.temperature}</span></div>
        <div class="detail-field"><label>Max Tokens</label><span>${a.max_tokens || 'default'}</span></div>
        <div class="detail-field"><label>Timeout</label><span>${a.timeout ? a.timeout + 's' : 'default'}</span></div>
        <div class="detail-field"><label>Rate Limit</label><span>${a.rate_limit || 'none'}</span></div>
        <div class="detail-field"><label>Tags</label><span>${a.tags.map(t => `<span class="tag">${t}</span>`).join('') || 'none'}</span></div>
        <div class="detail-field"><label>Stacks</label><span>${a.stacks.map(s => `<span class="tag stack">${s}</span>`).join('') || 'none'}</span></div>
      </div>
      ${a.orchestration || a.triggers || a.ring_config ? `
      <div class="prompt-box-title">Orchestration</div>
      <div class="detail-grid">
        ${a.orchestration ? `<div class="detail-field"><label>Pattern</label><span class="tag" style="background:var(--purple,#8b5cf6);color:#fff">${a.orchestration}</span></div>` : ''}
        ${a.triggers ? `<div class="detail-field"><label>Triggers</label><span>${
          [a.triggers.requires.length ? 'requires: [' + a.triggers.requires.join(', ') + ']' : '',
           a.triggers.excludes.length ? 'excludes: [' + a.triggers.excludes.join(', ') + ']' : '',
           a.triggers.min_round > 0 ? 'min_round: ' + a.triggers.min_round : '',
           a.triggers.max_round != null ? 'max_round: ' + a.triggers.max_round : '',
           'priority: ' + a.triggers.priority
          ].filter(Boolean).join(', ')
        }</span></div>` : ''}
        ${a.ring_config ? `<div class="detail-field"><label>Ring Config</label><span>${
          ['role: ' + a.ring_config.role,
           a.ring_config.position != null ? 'position: ' + a.ring_config.position : '',
           Math.abs(a.ring_config.vote_weight - 1.0) > 0.01 ? 'weight: ' + a.ring_config.vote_weight.toFixed(1) : ''
          ].filter(Boolean).join(', ')
        }</span></div>` : ''}
      </div>` : ''}
      ${a.model_resolution && a.model_resolution.length ? `
      <div class="prompt-box-title">Model Resolution (link targets)</div>
      <table style="margin-bottom:16px">
        <tr><th>Target</th><th>Resolved Model</th></tr>
        ${a.model_resolution.map(r => `<tr><td>${r.target}</td><td style="color:var(--green)">${r.resolved_model}</td></tr>`).join('')}
      </table>` : ''}
      <div class="prompt-box-title">System Prompt</div>
      <div class="prompt-box markdown-body">${renderMarkdown(a.system_prompt || '(none)')}</div>
      ${a.instructions ? `<div class="prompt-box-title">Instructions</div><div class="prompt-box markdown-body">${renderMarkdown(a.instructions)}</div>` : ''}
      ${a.output_format ? `<div class="prompt-box-title">Output Format</div><div class="prompt-box markdown-body">${renderMarkdown(a.output_format)}</div>` : ''}
      <div class="detail-field" style="margin-top:12px"><label>Source</label><span style="color:var(--muted)">${a.source}</span></div>
    </div>`;
  window.agentContent = a;
}

async function loadPrompts() {
  const res = await fetch('/api/prompts');
  const prompts = await res.json();
  const el = document.getElementById('prompts');
  if (!prompts.length) { el.innerHTML = '<div class="empty">No prompts found. Add .md files to ~/.config/armadai/prompts/</div>'; return; }
  el.innerHTML = `
    <div class="card-header">${prompts.length} prompts loaded</div>
    <table>
      <tr><th>Name</th><th>Description</th><th>Applies To</th><th>Source</th></tr>
      <tbody>
        ${prompts.map(p => `
          <tr class="clickable" onclick="viewPrompt('${p.name}')">
            <td>${p.name}</td>
            <td>${p.description || ''}</td>
            <td>${p.apply_to.map(a => `<span class="tag">${a}</span>`).join('')}</td>
            <td style="color:var(--muted)">${p.source}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  createSearchBar('prompts');
}

async function viewPrompt(name) {
  const res = await fetch(`/api/prompts/${encodeURIComponent(name)}`);
  const p = await res.json();
  if (p.error) return;
  viewBackTab = 'prompts';
  ['agents','prompts','skills','starters','history','costs','models'].forEach(id => document.getElementById(id).style.display = 'none');
  const el = document.getElementById('view');
  el.style.display = 'block';
  const promptMarkdown = reconstructPromptMarkdown(p);
  el.innerHTML = `
    <div class="detail">
      <div style="display:flex;gap:8px">
        <button class="back-btn" onclick="backToList()">&larr; Back to prompts</button>
        <button class="download-btn" onclick="downloadText('${p.name}.md', reconstructPromptMarkdown(promptContent))">↓ Download .md</button>
      </div>
      <h2>${p.name}</h2>
      <div class="detail-grid">
        <div class="detail-field"><label>Description</label><span>${p.description || '(none)'}</span></div>
        <div class="detail-field"><label>Applies To</label><span>${p.apply_to.map(a => `<span class="tag">${a}</span>`).join('') || 'none'}</span></div>
      </div>
      <div class="prompt-box-title">Content</div>
      <div class="prompt-box markdown-body">${renderMarkdown(p.body || '(empty)')}</div>
      <div class="detail-field" style="margin-top:12px"><label>Source</label><span style="color:var(--muted)">${p.source}</span></div>
    </div>`;
  window.promptContent = p;
}

async function loadSkills() {
  const res = await fetch('/api/skills');
  const skills = await res.json();
  const el = document.getElementById('skills');
  if (!skills.length) { el.innerHTML = '<div class="empty">No skills found. Install built-in skills with: armadai init --skills</div>'; return; }
  el.innerHTML = `
    <div class="card-header">${skills.length} skills loaded</div>
    <table>
      <tr><th>Name</th><th>Description</th><th>Version</th><th>Tools</th><th>Source</th></tr>
      <tbody>
        ${skills.map(s => `
          <tr class="clickable" onclick="viewSkill('${s.name}')">
            <td>${s.name}</td>
            <td>${s.description || ''}</td>
            <td>${s.version || ''}</td>
            <td>${s.tools.map(t => `<span class="tag stack">${t}</span>`).join('')}</td>
            <td style="color:var(--muted)">${s.source}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  createSearchBar('skills');
}

async function viewSkill(name) {
  const res = await fetch(`/api/skills/${encodeURIComponent(name)}`);
  const s = await res.json();
  if (s.error) return;
  viewBackTab = 'skills';
  ['agents','prompts','skills','starters','history','costs','models'].forEach(id => document.getElementById(id).style.display = 'none');
  const el = document.getElementById('view');
  el.style.display = 'block';
  const fileBlock = (f) => f.content
    ? `<details class="file-details"><summary>${f.name}</summary><pre class="file-content">${f.content.replace(/</g,'&lt;')}</pre></details>`
    : `<div style="font-size:14px;padding:2px 0;color:var(--muted)">${f.name} (binary)</div>`;
  let filesHtml = '';
  if (s.scripts.length) filesHtml += `<div class="list-section"><h3>Scripts</h3>${s.scripts.map(fileBlock).join('')}</div>`;
  if (s.references.length) filesHtml += `<div class="list-section"><h3>References</h3>${s.references.map(fileBlock).join('')}</div>`;
  if (s.assets.length) filesHtml += `<div class="list-section"><h3>Assets</h3>${s.assets.map(fileBlock).join('')}</div>`;
  const skillMarkdown = reconstructSkillMarkdown(s);
  el.innerHTML = `
    <div class="detail">
      <div style="display:flex;gap:8px">
        <button class="back-btn" onclick="backToList()">&larr; Back to skills</button>
        <button class="download-btn" onclick="downloadText('${s.name}-SKILL.md', reconstructSkillMarkdown(skillContent))">↓ Download SKILL.md</button>
      </div>
      <h2>${s.name}</h2>
      <div class="detail-grid">
        <div class="detail-field"><label>Description</label><span>${s.description || '(none)'}</span></div>
        <div class="detail-field"><label>Version</label><span>${s.version || '(none)'}</span></div>
        <div class="detail-field"><label>Tools</label><span>${s.tools.map(t => `<span class="tag stack">${t}</span>`).join('') || 'none'}</span></div>
      </div>
      <div class="prompt-box-title">SKILL.md</div>
      <div class="prompt-box markdown-body">${renderMarkdown(s.body || '(empty)')}</div>
      ${filesHtml}
      <div class="detail-field" style="margin-top:12px"><label>Source</label><span style="color:var(--muted)">${s.source}</span></div>
    </div>`;
  window.skillContent = s;
}

async function loadStarters() {
  const res = await fetch('/api/starters');
  const starters = await res.json();
  const el = document.getElementById('starters');
  if (!starters.length) { el.innerHTML = '<div class="empty">No starter packs found.</div>'; return; }
  el.innerHTML = `
    <div class="card-header">${starters.length} starter packs</div>
    <table>
      <tr><th>Name</th><th>Description</th><th>Agents</th><th>Prompts</th><th>Skills</th></tr>
      <tbody>
        ${starters.map(s => `
          <tr class="clickable" onclick="viewStarter('${s.name}')">
            <td>${s.name}</td>
            <td>${s.description}</td>
            <td>${s.agents_count}</td>
            <td>${s.prompts_count}</td>
            <td>${s.skills_count}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  createSearchBar('starters');
}

async function viewStarter(name) {
  const res = await fetch(`/api/starters/${encodeURIComponent(name)}`);
  const s = await res.json();
  if (s.error) return;
  viewBackTab = 'starters';
  ['agents','prompts','skills','starters','history','costs','models'].forEach(id => document.getElementById(id).style.display = 'none');
  const el = document.getElementById('view');
  el.style.display = 'block';

  // Fetch and parse YAML config for orchestration info
  let orchestrationHtml = '';
  try {
    const configRes = await fetch(`/api/starters/${encodeURIComponent(name)}/config`);
    const configYaml = await configRes.text();
    if (configYaml.includes('orchestration:')) {
      const orchStart = configYaml.indexOf('orchestration:');
      if (orchStart !== -1) {
        let orchEnd = configYaml.indexOf('\n\n', orchStart);
        if (orchEnd === -1) orchEnd = configYaml.length;
        const orchSection = configYaml.substring(orchStart, orchEnd).trim();
        orchestrationHtml = `<div class="list-section"><h3>Orchestration Configuration</h3><div class="yaml-block">${escapeHtmlContent(orchSection)}</div></div>`;
      }
    }
  } catch (e) {
    console.error('Failed to fetch config:', e);
  }

  el.innerHTML = `
    <div class="detail">
      <div style="display:flex;gap:8px">
        <button class="back-btn" onclick="backToList()">&larr; Back to starters</button>
        <a href="/api/starters/${encodeURIComponent(name)}/config" download="armadai.yaml" class="download-btn" style="text-decoration:none">&#8615; Download armadai.yaml</a>
      </div>
      <h2>${s.name}</h2>
      <p style="color:var(--muted);margin-bottom:20px">${s.description}</p>
      ${s.agents.length ? `<div class="list-section"><h3>Agents (${s.agents.length})</h3><ul>${s.agents.map(a => `<li>${a}</li>`).join('')}</ul></div>` : ''}
      ${s.prompts.length ? `<div class="list-section"><h3>Prompts (${s.prompts.length})</h3><ul>${s.prompts.map(p => `<li>${p}</li>`).join('')}</ul></div>` : ''}
      ${s.skills.length ? `<div class="list-section"><h3>Skills (${s.skills.length})</h3><ul>${s.skills.map(sk => `<li>${sk}</li>`).join('')}</ul></div>` : ''}
      ${orchestrationHtml}
    </div>`;
}

function backToList() {
  document.getElementById('view').style.display = 'none';
  document.getElementById(viewBackTab).style.display = 'block';
}

async function loadModels() {
  const res = await fetch('/api/models');
  const providers = await res.json();
  const el = document.getElementById('models');
  if (!providers.length) { el.innerHTML = '<div class="empty">No model data cached. Run `armadai new -i` to populate.</div>'; return; }
  const totalModels = providers.reduce((s, p) => s + p.models.length, 0);
  el.innerHTML = `
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>${totalModels} models, ${providers.length} providers</span>
      <button onclick="refreshModels()" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);cursor:pointer;font-size:12px">⟳ Sync models.dev</button>
    </div>
    ${providers.map((p, idx) => `
      <div style="padding:8px 16px;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(88,166,255,0.04)">${p.provider}</div>
      <table id="models-provider-${idx}">
        <tr><th>Model ID</th><th>Name</th><th>Context</th><th>Max Output</th><th>Cost In</th><th>Cost Out</th></tr>
        <tbody>
          ${p.models.map(m => `
            <tr>
              <td>${m.id}</td>
              <td>${m.name || '-'}</td>
              <td>${m.context ? (m.context/1000)+'K' : '-'}</td>
              <td>${m.max_output || '-'}</td>
              <td>${m.cost_input != null ? '$'+m.cost_input.toFixed(2) : '-'}</td>
              <td>${m.cost_output != null ? '$'+m.cost_output.toFixed(2) : '-'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`).join('')}`;

async function refreshModels() {
  const btn = document.querySelector('#models button');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  try {
    const res = await fetch('/api/models/refresh', { method: 'POST' });
    const data = await res.json();
    if (data.error) { alert('Sync failed: ' + data.error); }
    else { await loadModels(); }
  } catch (e) { alert('Sync failed: ' + e.message); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync models.dev'; } }
}

async function loadOrchestration() {
  const res = await fetch('/api/orchestration/topology');
  const data = await res.json();
  const el = document.getElementById('orchestration');

  if (!data.enabled) {
    el.innerHTML = '<div class="empty">No orchestration configured. Add an `orchestration:` section to armadai.yaml to enable.</div>';
    return;
  }

  const pattern = data.pattern || 'unknown';
  let diagram = '';

  if (pattern === 'hierarchical') {
    diagram = generateHierarchicalDiagram(data);
  } else if (pattern === 'blackboard') {
    diagram = generateBlackboardDiagram(data);
  } else if (pattern === 'ring') {
    diagram = generateRingDiagram(data);
  } else if (pattern === 'direct') {
    diagram = generateDirectDiagram(data);
  } else {
    diagram = `<p>Unknown pattern: ${pattern}</p>`;
  }

  el.innerHTML = `
    <div class="detail">
      <h2>Orchestration Topology</h2>
      <div class="detail-grid" style="grid-template-columns: 1fr;">
        <div class="detail-field"><label>Pattern</label><span class="tag" style="background:var(--purple,#8b5cf6);color:#fff;padding:4px 12px;font-size:13px">${pattern}</span></div>
      </div>
      ${data.coordinator ? `<div class="detail-field"><label>Coordinator</label><span style="font-family:monospace">${data.coordinator}</span></div>` : ''}
      <div style="margin-top:20px">${diagram}</div>
    </div>`;

  // Render mermaid diagrams
  mermaid.run();
}

function generateHierarchicalDiagram(data) {
  const coordinator = data.coordinator || 'Coordinator';
  let nodes = `User([User])-->coordinator["${coordinator}<br/>Coordinator"]`;

  data.teams.forEach((team, i) => {
    if (team.lead) {
      nodes += `\ncoordinator-->${team.lead}["${team.lead}<br/>Lead"]`;
      team.agents.forEach(agent => {
        nodes += `\n${team.lead}-->${agent}["${agent}"]`;
      });
    } else {
      team.agents.forEach(agent => {
        nodes += `\ncoordinator-->${agent}["${agent}"]`;
      });
    }
  });

  let styles = `\nstyle coordinator fill:#e74c3c,color:#fff`;
  data.teams.forEach((team) => {
    if (team.lead) {
      styles += `\nstyle ${team.lead} fill:#f39c12,color:#fff`;
    }
  });

  const mermaidCode = `flowchart TD\n${nodes}${styles}`;
  return `<div class="mermaid">${escapeHtml(mermaidCode)}</div>`;
}

function generateBlackboardDiagram(data) {
  let nodes = `User([User])-->Board["Shared Board"]`;
  data.agents.forEach(agent => {
    if (data.coordinator && agent === data.coordinator) {
      nodes += `\nBoard<-->${agent}["${agent}<br/>Coordinator"]`;
    } else {
      nodes += `\nBoard<-->${agent}["${agent}"]`;
    }
  });

  const mermaidCode = `flowchart TD\n${nodes}`;
  return `<div class="mermaid">${escapeHtml(mermaidCode)}</div>`;
}

function generateRingDiagram(data) {
  const agents = data.agents.filter(a => !data.coordinator || a !== data.coordinator);
  if (agents.length < 2) {
    return '<p>Ring pattern requires at least 2 agents</p>';
  }

  let nodes = '';
  for (let i = 0; i < agents.length; i++) {
    const current = agents[i];
    const next = agents[(i + 1) % agents.length];
    if (i === 0) {
      nodes += `${current}["${current}"]-->${next}["${next}"]`;
    } else {
      nodes += `\n${current}-->${next}`;
    }
  }
  // Close the ring
  nodes += `\n${agents[agents.length - 1]}-->${agents[0]}`;

  const mermaidCode = `flowchart LR\n${nodes}`;
  return `<div class="mermaid">${escapeHtml(mermaidCode)}</div>`;
}

function generateDirectDiagram(data) {
  const agent = data.coordinator || (data.agents.length > 0 ? data.agents[0] : 'agent');
  const mermaidCode = `flowchart TD\nUser([User])-->${agent}["${agent}"]`;
  return `<div class="mermaid">${escapeHtml(mermaidCode)}</div>`;
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

loadAgents();
