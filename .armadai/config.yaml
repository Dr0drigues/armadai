# ArmadAI project configuration
# See: https://github.com/Dr0drigues/swarm-festai

# Agents used in this project
agents:
  - name: dev-lead
  - name: core-specialist
  - name: provider-specialist
  - name: cli-specialist
  - name: ui-specialist
  - name: qa-specialist
  - name: release-manager

# Composable prompt fragments
prompts:
  - name: armadai-architecture
  - name: armadai-dev-conventions

skills: []

sources: []

# Linker configuration
link:
  target: claude
  coordinator: dev-lead

# Orchestration — auto-detected coordinator 'dev-lead'
orchestration:
  enabled: true
  pattern: hierarchical
  coordinator: dev-lead
  teams:
    - agents:
        - core-specialist
        - provider-specialist
        - cli-specialist
        - ui-specialist
        - qa-specialist
